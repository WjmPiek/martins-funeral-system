{% extends "base.html" %}{% block app_content %}
<section class="section-header"><div><h1>Upload Manual</h1><p class="muted">Upload a PDF manual version. New versions become the published version.</p></div><a class="btn secondary" href="{{ url_for('manuals.library') }}">Back</a></section>
<div class="form-section-card"><form method="post" enctype="multipart/form-data"><div class="form-grid"><label>Manual Title</label><input name="title" required><label>Version Label</label><input name="version_label" value="v1.0" required><label>PDF File</label><input type="file" name="file" accept="application/pdf,.pdf" required></div><div class="form-actions"><button class="btn" type="submit">Upload Manual</button></div></form></div>
{% endblock %}
