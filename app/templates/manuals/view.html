{% extends "base.html" %}{% block app_content %}
<section class="section-header"><div><h1>{{ version.manual.title }}</h1><p class="muted">{{ version.filename }} · {{ version.version_label }}</p></div><div class="button-row"><a class="btn secondary" href="{{ back_url }}">Back</a><a class="btn" target="_blank" href="{{ url_for('manuals.download_version', version_id=version.id) }}#toolbar=0&navpanes=0&scrollbar=0">Open PDF</a></div></section>
<div class="form-section-card"><object data="{{ url_for('manuals.download_version', version_id=version.id) }}#toolbar=0&navpanes=0&scrollbar=0" type="application/pdf" style="width:100%;height:calc(100vh - 230px);min-height:620px;border:0;"><p>PDF preview is not available. <a href="{{ url_for('manuals.download_version', version_id=version.id) }}">Open the PDF</a>.</p></object></div>
{% endblock %}
