{% extends 'base.html' %}{% block content %}<h3>{{'Edit' if product else 'New'}} Policy Product</h3><form method="post" class="row g-2"><div class="col-md-6"><label>Product Name</label><input class="form-control" name="product_name" value="{{product.product_name if product else ''}}"></div><div class="col-md-6"><label>Plan Name</label><input class="form-control" name="plan_name" value="{{product.plan_name if product else ''}}"></div><div class="col-md-3"><label>Cover Amount</label><input class="form-control" name="cover_amount" value="{{product.cover_amount if product else ''}}"></div><div class="col-md-3"><label>Monthly Premium</label><input class="form-control" name="monthly_premium" value="{{product.monthly_premium if product else ''}}"></div><div class="col-md-3"><label>Waiting Months</label><input class="form-control" name="waiting_period_months" value="{{product.waiting_period_months if product else ''}}"></div><div class="col-md-3"><label>Reason</label><input class="form-control" name="reason"></div><div class="col-md-2"><label>Min Age</label><input class="form-control" name="min_age" value="{{product.min_age if product else ''}}"></div><div class="col-md-2"><label>Max Age</label><input class="form-control" name="max_age" value="{{product.max_age if product else ''}}"></div><div class="col-md-2 form-check mt-4"><input class="form-check-input" type="checkbox" name="active" checked> Active</div><div class="col-12"><button class="btn btn-success">Save</button></div></form>{% endblock %}
