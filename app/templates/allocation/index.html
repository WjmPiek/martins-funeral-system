{% extends "base.html" %}{% block content %}<h1>Lead Allocation</h1><p>Assign unallocated leads to active agents in a branch using round-robin distribution.</p><form method="get" class="row g-2 mb-3"><div class="col-md-4"><select name="branch" class="form-select"><option value="">All / My Branch</option>{% for b in branches %}<option value="{{b}}" {% if branch==b %}selected{% endif %}>{{b}}</option>{% endfor %}</select></div><div class="col"><button class="btn btn-outline-primary">Filter</button></div></form><div class="alert alert-info">Unassigned leads in scope: <b>{{unassigned_count}}</b></div><form method="post"><input type="hidden" name="branch" value="{{branch or ''}}"><div class="mb-3"><label>How many leads to allocate now</label><input class="form-control" type="number" name="limit" value="50"></div><h4>Agents</h4>{% for a in agents %}<div class="form-check"><input class="form-check-input" type="checkbox" name="agent_ids" value="{{a.id}}" checked><label class="form-check-label">{{a.name}} - {{a.branch}}</label></div>{% endfor %}<button class="btn btn-success mt-3">Allocate Leads</button></form>{% endblock %}
