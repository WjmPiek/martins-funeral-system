{% extends "base.html" %}
{% block auth_content %}
<section class="card narrow login-card">
    <div class="login-branding" aria-label="Martins Funerals">
        <img
            class="login-logo"
            src="{{ url_for('static', filename='img/logo.png') }}"
            alt="Martins Funerals logo"
            loading="eager"
            decoding="async"
            fetchpriority="high"
            onerror="this.onerror=null;this.src='{{ url_for('static', filename='img/logo-placeholder.svg') }}';"
        >
    </div>
    <h1>Martins Funerals System</h1>
    <p class="login-subtitle">Sign in to continue</p>
    <form method="post">
        <label>Email address</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>
    <p><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>
    <p>No account yet? <a href="{{ url_for('auth.register') }}">Register here</a></p>
</section>
{% endblock %}
