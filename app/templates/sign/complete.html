<!doctype html>
<html lang="en">
<head>
  <title>Martin's Funerals | Complete</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{--mf-purple:#4b1f6f;--mf-gold:#c99a2e;}
    body{min-height:100vh;background:linear-gradient(135deg,#fff,#f2e9f8);font-family:Arial,Helvetica,sans-serif}.card{border:0;border-radius:24px;box-shadow:0 20px 55px rgba(75,31,111,.16)}.logo{max-width:180px;max-height:88px;object-fit:contain}.check{width:72px;height:72px;border-radius:50%;background:#198754;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:38px;font-weight:800}.footer-note{color:#6b6270;font-size:.9rem}
  </style>
</head>
<body>
<div class="container py-5" style="max-width:760px">
  <div class="card p-4 p-md-5 text-center">
    <div class="d-flex justify-content-center mb-3"><img class="logo" src="{{ url_for('static', filename='img/martins_logo.png') }}" alt="Martin's Funerals"></div>
    <div class="check mx-auto mb-3">✓</div>
    <h1 class="fw-bold" style="color:var(--mf-purple)">Documents Submitted</h1>
    <p class="lead">{{ message or 'Thank you. Your application documents have been signed and submitted securely.' }}</p>
    <div class="alert alert-success rounded-4 mt-3">Your signing link is now locked. Martin's Funerals will continue processing your application.</div>
    <div class="footer-note mt-4">Martin's Funerals | An Authorised Financial Service Provider (FSP 48189)</div>
  </div>
</div>
</body>
</html>
