{% extends "base.html" %}{% block content %}<h1>Live Wallboard</h1><p class="text-muted">Auto-refreshes every 20 seconds. Scope: {{branch or 'All branches'}}</p><div class="row g-3" id="cards"></div><h3 class="mt-4">Agents</h3><table class="table table-striped"><thead><tr><th>Agent</th><th>Branch</th><th>Calls</th><th>Sales</th><th>Conversion</th></tr></thead><tbody id="agents"></tbody></table><script>async function load(){let r=await fetch('{{ url_for('wallboard.data', branch=branch or '') }}');let d=await r.json();let keys=['total_calls','sales_today','callbacks_due','open_leads'];cards.innerHTML=keys.map(k=>`<div class="col-md-3"><div class="card"><div class="card-body"><div class="text-muted">${k.replaceAll('_',' ').toUpperCase()}</div><h1>${d[k]}</h1></div></div></div>`).join('');agents.innerHTML=d.agents.map(a=>`<tr><td>${a.name}</td><td>${a.branch||''}</td><td>${a.calls}</td><td>${a.sales}</td><td>${a.conversion}%</td></tr>`).join('');}load();setInterval(load,20000);</script>{% endblock %}
