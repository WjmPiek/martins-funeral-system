{% extends "attendance/base.html" %}{% block attendance_title %}Manual Attendance Event{% endblock %}{% block attendance_content %}<div class="form-section-card"><form method="post" class="professional-form"><div class="form-grid"><label>Staff</label><select name="staff_id">{% for s in staff_rows %}<option value="{{ s.id }}">{{ s.full_name }} - {{ s.employee_number }}</option>{% endfor %}</select><label>Action</label><select name="action"><option value="sign_in">Sign In</option><option value="sign_out">Sign Out</option></select><label>Date & Time</label><input type="datetime-local" name="event_time" required><label>Work Location Type</label><input name="work_location_type" value="Manual"><label>Note</label><textarea name="note"></textarea></div><div class="form-actions"><button class="button-auto">Save Manual Event</button></div></form></div>{% endblock %}
