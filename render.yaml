services:
  - type: web
    name: martins-web-system
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: martins-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: GMAIL_SMTP_USER
        sync: false
      - key: GMAIL_SMTP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: BASE_URL
        sync: false
      - key: UPLOAD_FOLDER
        value: app/static/uploads

databases:
  - name: martins-postgres
    plan: starter
